name: release

# Builds the scaffold-mcp binary for every target install.sh knows how to
# download, and attaches them to a GitHub Release. Asset names MUST stay in
# sync with install.sh: it fetches `scaffold-mcp-<target>` from
# releases/latest/download. Triggered by pushing a version tag (e.g. v0.1.0);
# workflow_dispatch builds without publishing, for testing.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
    defaults:
      run:
        working-directory: scaffold-mcp
    steps:
      - uses: actions/checkout@v4

      # Uses the current stable toolchain. The crate pins rust-version = 1.95
      # in Cargo.toml; if stable lags behind that, pin `toolchain:` here instead.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: scaffold-mcp

      - name: Install cross linker
        if: matrix.apt_packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        run: cp "target/${{ matrix.target }}/release/scaffold-mcp" "scaffold-mcp-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: scaffold-mcp-${{ matrix.target }}
          path: scaffold-mcp/scaffold-mcp-${{ matrix.target }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
